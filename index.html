<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Profesional</title>
    <style>
        :root {
            --bg-color: #f5f5f7;
            --card-bg: rgba(255, 255, 255, 0.9);
            --accent: #0071e3;
            --text: #1d1d1f;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 420px;
        }
        h2 { text-align: center; font-weight: 600; margin-bottom: 25px; letter-spacing: -0.5px; }
        .group { margin-bottom: 15px; }
        label { display: block; font-size: 11px; font-weight: 600; margin-bottom: 6px; color: #86868b; text-transform: uppercase; }
        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #d2d2d7;
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            box-sizing: border-box;
            background: #ffffff;
        }
        input:focus { border-color: var(--accent); ring: 2px var(--accent); }
        button {
            width: 100%;
            padding: 14px;
            background-color: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s ease;
        }
        button:hover { background-color: #0077ed; transform: translateY(-1px); }
    </style>
</head>
<body>

<div class="container">
    <h2>Registro Especialista</h2>
    <form action="/registrar" method="POST">
        <div class="group">
            <label>Nombre Completo</label>
            <input type="text" name="nombre" required>
        </div>
        <div class="group">
            <label>Número de Teléfono</label>
            <input type="tel" name="numero" required>
        </div>
        <div class="group">
            <label>Correo Electrónico</label>
            <input type="email" name="correo" required>
        </div>
        <div class="group">
            <label>Rama Médica</label>
            <select name="rama">
                <option value="General">Medicina General</option>
                <option value="Radiologia">Radiología / Imagenología</option>
                <option value="Cardiologia">Cardiología</option>
                <option value="Odontologia">Odontología</option>
            </select>
        </div>
        <div class="group">
            <label>¿Es Cliente Actual?</label>
            <select name="cliente">
                <option value="Si">Sí</option>
                <option value="No">No</option>
            </select>
        </div>
        <div class="group">
            <label>Predicción Mundial 2026</label>
            <input type="text" name="mundial" placeholder="¿Quién crees que gane?">
        </div>
        <button type="submit">Guardar Registro</button>
    </form>
</div>

</body>
</html>
